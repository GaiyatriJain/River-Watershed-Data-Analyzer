    font-size: 14px;

  #input-row {

    align-items: center;
    gap: 8px;
    border-top: 1px solid #222;
    padding-top: 10px;
  }
  #prompt { color: #00d4ff; white-space: nowrap; }
  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #c8ffc8;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    caret-color: #c8ffc8;
  }

const term = document.getElementById('terminal');
const input = document.getElementById('user-input');
const promptEl = document.getElementById('prompt');

function print(text, cls) {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text;
  term.appendChild(span);
  term.scrollTop = term.scrollHeight;
}
function println(text, cls) { print(text + '\n', cls); }
function setPrompt(p) { promptEl.textContent = p; }

let state = 'menu';
let sub = {};

function avg(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
function f(n,d=2) { return n.toFixed(d); }
function pad(s,n) { return String(s).padEnd(n); }
function lpad(s,n) { return String(s).padStart(n); }
function stations() { return [...new Set(DATA.map(r=>r[0]))]; }

function printMenu() {
  println('');
  println('╔══════════════════════════════════════╗','white');
  println('║   River Watershed Data Analyzer      ║','white');
  println('╠══════════════════════════════════════╣','white');
  println('║  1. Summary statistics               ║','white');
  println('║  2. Flood risk alerts                ║','white');
  println('║  3. Pollution spike detection        ║','white');
  println('║  4. Station report                   ║','white');
  println('║  5. List all stations                ║','white');
  println('║  6. Export pollution report (.csv)   ║','white');
  println('║  7. Quit                             ║','white');
  println('╚══════════════════════════════════════╝','white');
  setPrompt('  Choice: ');
  state = 'menu';
}

function doSummary() {
  const n = DATA.length;
  let tFlow=0,tLevel=0,tTemp=0,tPoll=0;
  let maxFlow=-Infinity,minFlow=Infinity,maxPoll=-Infinity;
  let maxFlowSt='',maxPollSt='';
  for (const r of DATA) {
    tFlow+=r[2]; tLevel+=r[3]; tTemp+=r[4]; tPoll+=r[5];
    if(r[2]>maxFlow){maxFlow=r[2];maxFlowSt=r[0];}
    if(r[2]<minFlow) minFlow=r[2];
    if(r[5]>maxPoll){maxPoll=r[5];maxPollSt=r[0];}
  }
  println('');
  println('══════════════ SUMMARY STATISTICS ══════════════','cyan');
  println(`  Total readings      : ${n}`);
  println(`  Avg flow rate       : ${f(tFlow/n)} m\u00b3/s`);
  println(`  Avg water level     : ${f(tLevel/n)} m`);
  println(`  Avg temperature     : ${f(tTemp/n)} \u00b0C`);
  println(`  Avg pollution index : ${f(tPoll/n)} / 100`);
  println(`  Peak flow           : ${f(maxFlow)} m\u00b3/s  @ ${maxFlowSt}`);
  println(`  Lowest flow         : ${f(minFlow)} m\u00b3/s`);
  println(`  Worst pollution     : ${f(maxPoll)} / 100 @ ${maxPollSt}`);
  println('═════════════════════════════════════════════════','cyan');
}

function doFlood(lev, flow) {
  println('');
  println('══════════════ FLOOD RISK ALERTS ════════════════','cyan');
  println(`  Threshold \u2014 Level: ${f(lev)} m  |  Flow: ${f(flow,0)} m\u00b3/s`);
  println('');
  const hits = DATA.filter(r=>r[3]>=lev||r[2]>=flow);
  if (!hits.length) {
    println('  No readings exceed the thresholds. All clear!','green');
  } else {
    for (const r of hits)
      println(`  [!] ${pad(r[0],22)} ${r[1]}   Level: ${lpad(f(r[3]),5)} m   Flow: ${lpad(f(r[2],1),8)} m\u00b3/s`,'yellow');
    println('');
    println(`  ${hits.length} alert(s) found.`);
  }
  println('═════════════════════════════════════════════════','cyan');
}

function doPollution(thresh) {
  println('');
  println('══════════════ POLLUTION SPIKES ═════════════════','cyan');
  println(`  Showing readings with pollution index > ${f(thresh,1)}`);
  println('');
  const hits = DATA.filter(r=>r[5]>thresh);
  if (!hits.length) {
    println(`  No spikes above ${f(thresh,1)} detected.`,'green');
  } else {
    for (const r of hits)
      println(`  [!] ${pad(r[0],22)} ${r[1]}   Pollution: ${lpad(f(r[5],1),5)}   Temp: ${f(r[4],1)}\u00b0C`,'red');
    println('');
    println(`  ${hits.length} spike(s) found.`);
  }
  println('═════════════════════════════════════════════════','cyan');
}

function doList() {
  println('');
  println('  Known stations:');
  for (const s of stations()) println(`    \u2022 ${s}`);
  println('');
}

function doStation(station) {
  println('');
  println(`\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 STATION REPORT: ${pad(station,16)}\u2550`,'cyan');
  const rows = DATA.filter(r=>r[0]===station);
  if (!rows.length) {
    println(`  No readings found for station '${station}'.`,'red');
  } else {
    let tf=0,tl=0,tp=0;
    for (const r of rows) {
      println(`  ${r[1]}   Flow: ${lpad(f(r[2],1),8)} m\u00b3/s   Level: ${lpad(f(r[3]),5)} m   Temp: ${lpad(f(r[4],1),5)}\u00b0C   Pollution: ${lpad(f(r[5],1),5)}`);
      tf+=r[2]; tl+=r[3]; tp+=r[5];
    }
    const n=rows.length;
    println('');
    println(`  Averages over ${n} reading(s): Flow ${f(tf/n)}  Level ${f(tl/n)}  Pollution ${f(tp/n,1)}`);
  }
  println('═════════════════════════════════════════════════','cyan');
}

function doExport(thresh) {
  const hits = DATA.filter(r=>r[5]>thresh);
  const header = 'station,date,flow_rate,water_level,temperature,pollution_index\n';
  const rows   = hits.map(r=>r.join(',')).join('\n');
  const blob   = new Blob([header+rows],{type:'text/csv'});
  const a      = document.createElement('a');
  a.href       = URL.createObjectURL(blob);
  a.download   = 'pollution_report.csv';
  a.click();
  println(`  Exported ${hits.length} row(s) to pollution_report.csv.`,'green');
}

input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = input.value.trim();
  input.value = '';
  print(promptEl.textContent);
  println(val, 'white');

  switch (state) {
    case 'menu': {
      const n = parseInt(val);
      if      (n===1) { doSummary(); printMenu(); }
      else if (n===2) { sub={}; setPrompt('  Water level threshold (m)  [default 4.5]: '); state='flood-lev'; }
      else if (n===3) { setPrompt('  Pollution index threshold [default 60]: '); state='poll'; }
      else if (n===4) { doList(); setPrompt('  Station name: '); state='station'; }
      else if (n===5) { doList(); printMenu(); }
      else if (n===6) { setPrompt('  Pollution threshold [default 60]: '); state='export'; }
      else if (n===7) { println('\n  Goodbye. Stay conservancy-minded!','cyan'); setPrompt(''); state='done'; }
      else            { println('  Invalid choice. Try 1-7.','red'); printMenu(); }
      break;
    }
    case 'flood-lev': {
      sub.lev = parseFloat(val)||4.5;
      setPrompt('  Flow rate threshold (m\u00b3/s) [default 800]: ');
      state='flood-flow';
      break;
    }
    case 'flood-flow': {
      doFlood(sub.lev, parseFloat(val)||800);
      printMenu();
      break;
    }
    case 'poll': {
      doPollution(parseFloat(val)||60);
      printMenu();
      break;
    }
    case 'station': {
      doStation(val);
      printMenu();
      break;
    }
    case 'export': {
      doExport(parseFloat(val)||60);
      printMenu();
      break;
    }
  }
});

println('Sample data loaded: 85 readings across 5 stations.','dim');
printMenu();
